<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Xero Authentication</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-blue-200 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-lg p-8 max-w-md w-full text-center">
        <div class="flex flex-col items-center">
            <svg class="w-16 h-16 mb-4 text-blue-600" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
            </svg>
            <h1 class="text-3xl font-bold text-blue-700 mb-2">Xero Authentication</h1>
            <p class="text-gray-600 mb-6">Click the button below to authenticate with Xero:</p>
            <a href="{{AUTH_URL}}" target="_blank"
               class="inline-block px-6 py-3 bg-blue-600 text-white font-semibold rounded-lg shadow hover:bg-blue-700 transition duration-200 text-lg mb-6">
                Authenticate with Xero
            </a>
            <div class="text-gray-500 text-sm">
                <p class="mb-2">After authentication, you'll be redirected to the callback URL.</p>
                <p>
                    <span class="font-semibold text-gray-700">Redirect URI:</span>
                    <span class="break-all">{{REDIRECT_URI}}</span>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
