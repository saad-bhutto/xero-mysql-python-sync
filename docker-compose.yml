version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: xero_sync_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: xero_sync
      MYSQL_USER: xero_user
      MYSQL_PASSWORD: xero_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
